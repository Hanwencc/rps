[server]
bridge_addr = "0.0.0.0:8024"
web_addr = "0.0.0.0:8080"
web_dir = "/usr/share/rps/web"
database_path = "/var/lib/rps/rps.db"

[server.web_auth]
enabled = true
username = "admin"
password = "change-me"
session_ttl_secs = 86400

[server.http_proxy]
listen = "0.0.0.0:10082"
client_id = "client-1"
enabled = true

[server.socks5]
listen = "0.0.0.0:10083"
client_id = "client-1"
enabled = true

[[clients]]
id = "client-1"
psk = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
enabled = true
remark = "docker demo agent"
max_connections = 1024
compress = false
encrypt = false

[[tunnels]]
id = "tcp-echo"
client_id = "client-1"
mode = "tcp"
listen = "0.0.0.0:10080"
target = "rps-target:18081"
enabled = true

[[tunnels]]
id = "udp-echo"
client_id = "client-1"
mode = "udp"
listen = "0.0.0.0:10081"
target = "rps-target:18082"
enabled = true
